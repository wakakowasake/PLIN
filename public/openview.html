<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PLIN - 공유 여행 보기</title>
    <meta name="description" content="공유된 PLIN 여행을 앱 또는 웹에서 확인해 보세요.">
    <meta property="og:title" content="PLIN - 공유 여행 보기">
    <meta property="og:description" content="공유된 PLIN 여행을 앱 또는 웹에서 확인해 보세요.">
    <meta property="og:image" content="https://plin-db93d.web.app/images/og-image.png">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/icon-180.png">
    <style>
        :root {
            color-scheme: light;
            --accent: #ff6600;
            --accent-dark: #e85500;
            --ink: #1d2026;
            --muted: #6f7682;
            --line: #e5e7ec;
            --paper: rgba(255, 255, 255, 0.94);
            font-family: Pretendard, Inter, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff7ed;
            color: var(--ink);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                linear-gradient(180deg, rgba(255, 247, 237, 0.72), rgba(255, 255, 255, 0.95)),
                url("/images/trip-destinations/jeju.jpg") center / cover no-repeat;
        }

        main {
            width: min(100%, 430px);
            border: 1px solid rgba(255, 255, 255, 0.72);
            border-radius: 28px;
            background: var(--paper);
            box-shadow: 0 28px 80px rgba(75, 48, 24, 0.2);
            padding: 32px 24px 26px;
            text-align: center;
            backdrop-filter: blur(18px);
        }

        .logo {
            width: 66px;
            height: 66px;
            margin: 0 auto 20px;
            border-radius: 20px;
            box-shadow: 0 14px 30px rgba(255, 102, 0, 0.24);
        }

        h1 {
            margin: 0;
            font-size: clamp(27px, 8vw, 36px);
            line-height: 1.22;
            letter-spacing: 0;
        }

        p {
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.66;
        }

        .actions {
            display: grid;
            gap: 10px;
            margin-top: 26px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .button {
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 18px;
            padding: 12px 16px;
            border: 1px solid var(--line);
            background: #ffffff;
            color: var(--ink);
            font-size: 16px;
            font-weight: 800;
            line-height: 1.3;
        }

        .button-primary {
            border-color: var(--accent);
            background: var(--accent);
            color: #ffffff;
            box-shadow: 0 14px 30px rgba(255, 102, 0, 0.24);
        }

        .store-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 18px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .store-link img {
            width: 18px;
            height: 18px;
        }

        .hint {
            margin-top: 14px;
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <main>
        <img class="logo" src="/images/icon-180.png" alt="PLIN">
        <h1>공유된 여행을<br>열고 있어요.</h1>
        <p>
            앱이 있다면 앱으로 바로 열고,<br>
            없으면 웹에서도 일정을 확인할 수 있어요.
        </p>
        <div class="actions" aria-label="공유 여행 열기">
            <a data-public-app-url href="/m" class="button button-primary">앱에서 보기</a>
            <a data-public-web-url href="/m" class="button">웹으로 볼게요</a>
        </div>
        <a href="https://play.google.com/store/apps/details?id=ink.plin.mobile" class="store-link">
            <img src="/images/store/google-play-icon.svg" alt="">
            <span>앱이 없다면 Google Play에서 설치</span>
        </a>
        <p class="hint">잠시 후 웹 공개 보기로 이동합니다.</p>
    </main>
    <script>
        (function () {
            var injectedToken = "__PLIN_PUBLIC_TRIP_TOKEN__";
            var params = new URLSearchParams(window.location.search);
            var token = injectedToken.indexOf("__PLIN_") === 0 ? (params.get("token") || "") : injectedToken;
            var webUrl = token ? "/m?publicTrip=" + encodeURIComponent(token) : "/m";
            var appUrl = token ? "plinmobile://p/" + encodeURIComponent(token) : "/m";

            document.querySelectorAll("[data-public-web-url]").forEach(function (link) {
                link.setAttribute("href", webUrl);
            });
            document.querySelectorAll("[data-public-app-url]").forEach(function (link) {
                link.setAttribute("href", appUrl);
            });

            if (token && !params.has("stay")) {
                window.setTimeout(function () {
                    window.location.replace(webUrl);
                }, 360);
            }
        })();
    </script>
</body>

</html>
