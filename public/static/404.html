<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>페이지를 찾을 수 없어요 - PLIN</title>
    <meta name="description" content="요청하신 PLIN 페이지를 찾을 수 없어요.">
    <link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/icon-180.png">
    <style>
        :root {
            color-scheme: light;
            --accent: #ff6600;
            --ink: #1d2026;
            --muted: #6f7682;
            --line: #e5e7ec;
            font-family: Pretendard, Inter, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff8f1;
            color: var(--ink);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                linear-gradient(180deg, rgba(255, 248, 241, 0.8), rgba(255, 255, 255, 0.96)),
                url("/images/trip-destinations/busan.jpg") center / cover no-repeat;
        }

        main {
            width: min(100%, 440px);
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 28px 80px rgba(75, 48, 24, 0.18);
            padding: 34px 24px 28px;
            text-align: center;
            backdrop-filter: blur(18px);
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            border-radius: 19px;
            box-shadow: 0 14px 30px rgba(255, 102, 0, 0.22);
        }

        .code {
            margin: 0;
            color: var(--accent);
            font-size: 18px;
            font-weight: 900;
            line-height: 1.2;
        }

        h1 {
            margin: 10px 0 0;
            font-size: clamp(27px, 8vw, 36px);
            line-height: 1.24;
            letter-spacing: 0;
        }

        p {
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.65;
        }

        .actions {
            display: grid;
            gap: 10px;
            margin-top: 26px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .button {
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: #ffffff;
            font-size: 16px;
            font-weight: 800;
        }

        .button-primary {
            border-color: var(--accent);
            background: var(--accent);
            color: #ffffff;
            box-shadow: 0 14px 30px rgba(255, 102, 0, 0.24);
        }
    </style>
</head>

<body>
    <main>
        <img class="logo" src="/images/icon-180.png" alt="PLIN">
        <p class="code">404</p>
        <h1>이 주소에서는<br>페이지를 찾을 수 없어요.</h1>
        <p>
            링크가 바뀌었거나 공개가 종료되었을 수 있어요.<br>
            홈에서 다시 시작해 주세요.
        </p>
        <div class="actions">
            <a href="/" class="button button-primary">PLIN 홈으로 가기</a>
            <a href="/m" class="button">앱 화면으로 열기</a>
        </div>
    </main>
</body>

</html>
